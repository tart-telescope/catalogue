events {}
http {
    # Define the cache path, memory zone size, and maximum disk size
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=app_cache:10m max_size=1g inactive=60m use_temp_path=off;

    server {
        listen 80;

        location / {
            # Pass requests to the backend service (e.g., "web")
            proxy_pass http://object-position-server:8876;

            # Enable the defined cache zone
            proxy_cache app_cache;

            # Define valid status codes and their cache duration
            proxy_cache_valid 200 302 10m;
            proxy_cache_valid 404 1m;

            # Use stale data in case of error, timeout, or while updating
            proxy_cache_use_stale error timeout updating;

            # Add a header to check cache status for debugging
            add_header X-Cache-Status $upstream_cache_status;

            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Example: Don't cache API endpoints
        location /api/ {
            proxy_pass http://object-position-server:8080/;
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
    }
}
