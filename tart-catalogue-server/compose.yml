services:
  object-position-server:
    build:
      context: .
    restart: unless-stopped
    # environment:
    #     - UVICORN_ROOT_PATH="/catalog"

    volumes:
      - ~/catalog_cache:/object_position_server/orbit_data
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"

  nginx:
    image: nginx:alpine
    ports:
      - 8876:80
    depends_on:
      - object-position-server
    restart: unless-stopped
    volumes:
      # Mount the custom nginx config file
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Mount a volume for the cache data to persist
      - nginx-cache:/var/cache/nginx

volumes:
  # Define the named volume for Nginx cache
  nginx-cache:
    driver: local
